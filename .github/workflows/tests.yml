name: tests

# Runs the repository's own gate: leak scan, zero-dependency check,
# self-contained demo check, then the test suite.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pytest
      - run: chmod +x check-sources.sh && ./check-sources.sh
